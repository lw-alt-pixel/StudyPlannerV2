<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Planner Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 p-8 transition-colors duration-500">
    
    <h1 class="text-3xl font-bold mb-6">Study Planner Pro</h1>

    <div class="flex gap-4 mb-6 border-b pb-2">
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="schedule">Schedule</button>
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="focus">Focus</button>
    </div>

    <div id="schedule" class="tab-content active bg-white rounded-lg shadow overflow-hidden relative" style="height: 600px;">
       <style>
    /* Restore your original grid variables! */
    :root {
        --pan-x: 0px; 
        --pan-y: 0px; 
        --px-per-hour: 60px; 
        --px-per-min: 1px; 
        --day-width: 180px;
        --zoom: 1;
    }
    
    .canvas-container { touch-action: none; overscroll-behavior: none; }
    
    #canvas-grid {
        background-image: 
            linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px),
            linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px);
        background-size: var(--day-width) calc(var(--px-per-hour) * var(--zoom));
    }
</style>

<div id="schedule" class="tab-content active h-[80vh] flex flex-col p-4">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800">🗓️ Infinite Timeline</h2>
        <button id="addBlockBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow-md transition-all">+ Add Block</button>
    </div>

    <div id="canvas-container" class="relative flex-1 overflow-hidden bg-gray-50 rounded-xl border-2 border-gray-200 canvas-container cursor-grab">
        
        <div id="canvas-layer" class="absolute top-12 left-16 will-change-transform" style="transform: translate(var(--pan-x), var(--pan-y));">
            <div id="canvas-grid" class="absolute top-0 pointer-events-none" style="width: 200000px; left: -100000px; height: calc(24 * 60px * var(--zoom)); border-bottom: 1px solid rgba(0,0,0,0.1);"></div>
            <div id="blocks-layer" class="absolute top-0 pointer-events-auto" style="width: 200000px; left: -100000px; height: calc(24 * 60px * var(--zoom));"></div>
        </div>

        <div class="absolute top-0 left-16 right-0 h-12 z-20 overflow-hidden pointer-events-none bg-white/90 backdrop-blur-md border-b border-gray-200">
            <div id="canvas-days" class="absolute top-0 h-12 flex items-end pb-2 font-bold text-gray-700 text-sm" style="width: 200000px; left: calc(-100000px + var(--pan-x));"></div>
        </div>

        <div class="absolute top-12 left-0 bottom-0 w-16 z-20 bg-white/90 backdrop-blur-md border-r border-gray-200 overflow-hidden pointer-events-none">
            <div id="canvas-times" class="absolute left-0 w-16 flex flex-col items-center text-xs font-bold text-gray-500" style="height: calc(24 * 60px * var(--zoom)); top: var(--pan-y);"></div>
        </div>

        <div class="absolute top-0 left-0 w-16 h-12 z-[30] bg-white border-b border-r border-gray-200 pointer-events-none"></div>
    </div>
</div>
            </div>
        </div>
        
        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-lg shadow border border-gray-200 pointer-events-none">
            <h2 class="font-bold text-gray-800">📅 Schedule Canvas</h2>
            <p class="text-xs text-gray-500">Click and drag to pan. Scroll to zoom.</p>
        </div>
    </div>

   <div id="focus" class="tab-content hidden bg-white p-6 rounded-lg shadow">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">🎯 Focus Mode</h2>
            
            <div class="flex bg-gray-200 rounded-lg p-1 cursor-pointer">
                <button id="modeStopwatch" class="px-4 py-1 rounded shadow bg-white font-bold text-sm transition-all">Stopwatch</button>
                <button id="modePomodoro" class="px-4 py-1 rounded text-gray-500 font-bold text-sm transition-all">Pomodoro</button>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center p-10 bg-gray-50 rounded-xl border-2 border-gray-100 relative">
            
            <div id="phaseIndicator" class="absolute top-4 bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-black uppercase tracking-wider">
                Study Phase
            </div>

            <div id="timerDisplay" class="text-8xl font-bold font-mono text-gray-800 my-8 transition-colors">00:00</div>
            
            <div class="flex gap-4">
                <button id="toggleTimerBtn" class="bg-green-500 hover:bg-green-600 text-white w-32 py-3 rounded-lg font-bold shadow-md transition-all">START</button>
                <button id="switchPhaseBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white w-32 py-3 rounded-lg font-bold shadow-md transition-all">TAKE BREAK</button>
            </div>
        </div>
    </div>

    <button id="openAddBlockModal" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-bold transition-transform hover:scale-110 z-[999]">
        +
    </button>

    <div id="addBlockModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[1000] flex items-center justify-center pointer-events-auto">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-96 transform transition-all">
            <h3 class="text-xl font-bold mb-4">Add Study Block</h3>
            
            <label class="block text-sm font-bold text-gray-700 mb-1">Subject / Title</label>
            <input type="text" id="newBlockTitle" class="w-full p-2 border rounded mb-4" placeholder="e.g. Physics Chapter 4">
            
            <label class="block text-sm font-bold text-gray-700 mb-1">Color</label>
            <input type="color" id="newBlockColor" class="w-full h-10 border rounded mb-6 cursor-pointer" value="#3b82f6">
            
            <div class="flex justify-end gap-2">
                <button id="cancelAddBlock" class="px-4 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded font-bold">Cancel</button>
                <button id="saveNewBlock" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/App.js"></script>
</body>
</html>

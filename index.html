<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Planner Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-8">
    
    <h1 class="text-3xl font-bold mb-6">Study Planner Pro</h1>

    <div class="flex gap-4 mb-6 border-b pb-2">
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="schedule">Schedule</button>
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="pomodoro">Pomodoro</button>
    </div>
<div id="schedule" class="tab-content active bg-white rounded-lg shadow overflow-hidden relative" style="height: 600px;">
        
        <div id="canvas-container" class="w-full h-full cursor-grab relative" style="touch-action: none;">
            
            <div id="infinite-canvas" class="absolute top-0 left-0 origin-top-left transform-gpu" style="width: 5000px; height: 5000px; transform: translate(0px, 0px) scale(1);">
                
                <div class="absolute inset-0" style="background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px); background-size: 40px 40px;"></div>

                <div id="blocks-layer" class="absolute inset-0 pointer-events-none"></div>
            </div>
        </div><button id="openAddBlockModal" class="absolute bottom-6 right-6 w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-xl flex items-center justify-center text-2xl font-bold transition-transform hover:scale-110 z-50">
            +
        </button>

        <div id="addBlockModal" class="hidden absolute inset-0 bg-gray-900/50 backdrop-blur-sm z-[100] flex items-center justify-center pointer-events-auto">
            <div class="bg-white p-6 rounded-xl shadow-2xl w-96 transform transition-all">
                <h3 class="text-xl font-bold mb-4">Add Study Block</h3>
                
                <label class="block text-sm font-bold text-gray-700 mb-1">Subject / Title</label>
                <input type="text" id="newBlockTitle" class="w-full p-2 border rounded mb-4" placeholder="e.g. Physics Chapter 4">
                
                <label class="block text-sm font-bold text-gray-700 mb-1">Color</label>
                <input type="color" id="newBlockColor" class="w-full h-10 border rounded mb-6 cursor-pointer" value="#3b82f6">
                
                <div class="flex justify-end gap-2">
                    <button id="cancelAddBlock" class="px-4 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded font-bold">Cancel</button>
                    <button id="saveNewBlock" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold">Save</button>
                </div>
            </div>
        </div>
        
        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-lg shadow border border-gray-200 pointer-events-none">
            <h2 class="font-bold text-gray-800">📅 Schedule Canvas</h2>
            <p class="text-xs text-gray-500">Click and drag to pan. Scroll to zoom.</p>
        </div>
    </div>

    <div id="pomodoro" class="tab-content hidden bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-bold text-gray-800 mb-4">⏱️ Pomodoro Timer</h2>
        
        <div class="flex flex-col items-center justify-center p-8 bg-gray-50 rounded-xl border-2 border-gray-100">
            <div id="timerDisplay" class="text-6xl font-bold font-mono text-gray-700 mb-8">
                00:00
            </div>
            
            <div class="flex gap-4">
                <button id="startTimerBtn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-all">
                    START
                </button>
                <button id="stopTimerBtn" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-all">
                    STOP
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/App.js"></script>
</body>
</html>

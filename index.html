<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Planner Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-8">
    
    <h1 class="text-3xl font-bold mb-6">Study Planner Pro</h1>

    <div class="flex gap-4 mb-6 border-b pb-2">
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="schedule">Schedule</button>
        <button class="tab-btn px-4 py-2 rounded-lg font-bold transition-all" data-tab="pomodoro">Pomodoro</button>
    </div>

    <div id="schedule" class="tab-content hidden bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-bold">📅 Schedule View</h2>
        <p>Your infinite canvas will go here.</p>
    </div>

    <div id="pomodoro" class="tab-content hidden bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-bold text-gray-800 mb-4">⏱️ Pomodoro Timer</h2>
        
        <div class="flex flex-col items-center justify-center p-8 bg-gray-50 rounded-xl border-2 border-gray-100">
            <div id="timerDisplay" class="text-6xl font-bold font-mono text-gray-700 mb-8">
                00:00
            </div>
            
            <div class="flex gap-4">
                <button id="startTimerBtn" class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-all">
                    START
                </button>
                <button id="stopTimerBtn" class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-all">
                    STOP
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/App.js"></script>
</body>
</html>
